<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCIV — The Vessel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{--bg:oklch(0.08 0.02 260);--surface:oklch(0.15 0.03 260);--surface-hover:oklch(0.20 0.04 260);--gold:oklch(0.70 0.15 85);--gold-dim:oklch(0.55 0.12 85);--ink:oklch(0.85 0.02 260);--ink-muted:oklch(0.55 0.03 260);--hud-bg:oklch(0.05 0.01 260 / 0.85);--border:oklch(0.25 0.04 260);--font-serif:'Georgia','Times New Roman',serif;--font-mono:'SF Mono','Cascadia Code','Consolas',monospace;--font-ui:system-ui,-apple-system,sans-serif;--tb-w:44px;--pn-w:280px;--ts:400ms;--background:var(--bg);--foreground:var(--ink);--card:var(--surface);--card-foreground:var(--ink);--popover:var(--surface);--popover-foreground:var(--ink);--primary:var(--gold);--primary-foreground:var(--bg);--secondary:var(--surface-hover);--secondary-foreground:var(--ink);--muted:var(--surface);--muted-foreground:var(--ink-muted);--accent:var(--surface-hover);--accent-foreground:var(--ink);--destructive:oklch(0.60 0.20 30);--destructive-foreground:var(--ink);--input:var(--border);--ring:var(--gold-dim);--radius:0.25rem}

body{background:var(--bg);overflow:hidden;font-family:var(--font-ui);color:var(--ink)}
canvas{display:block}

@media(max-width:640px){
  :root{--tb-w:36px}
}

@media(prefers-reduced-motion:reduce){
  #root *{transition:none!important}
}
</style>
</head>
<body>

<div id="root"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
